# Apioni IDE — desktop release (open-core), macOS + Windows + Linux.
#
# macOS  : universal (Apple Silicon + Intel) .app, signed + notarized, then the
#          .dmg wrapper is SEPARATELY notarized + stapled (tauri-action staples
#          only the .app, so a dmg-level `spctl` check would reject an un-stapled
#          .dmg — pitfall #38). This is the only signed platform.
# Windows: x64 NSIS installer (.exe). UNSIGNED — no paid Authenticode cert, so
#          SmartScreen shows a one-time "unknown publisher" prompt. Open-source
#          convention; documented in the README.
# Linux  : x86_64 AppImage (portable, no install).
#
# Each platform also publishes a version-less copy so the website can link to a
# stable URL that survives version bumps:
#   releases/latest/download/Apioni-IDE_universal.dmg     (macOS)
#   releases/latest/download/Apioni-IDE_x64-setup.exe     (Windows)
#   releases/latest/download/Apioni-IDE_x86_64.AppImage   (Linux)
#
# Auto-update (tauri-plugin-updater) is wired for macOS only for now: latest.json
# is generated by the macOS job. Windows/Linux users update by re-downloading;
# their updater check simply finds no entry and no-ops. A combined latest.json is
# a later addition.
#
# Trigger: push a tag like `desktop-v0.1.1`, or run manually.
#
# Required repo secrets (macOS signing; all optional — empty = unsigned build):
#   APPLE_CERTIFICATE  APPLE_CERTIFICATE_PASSWORD  APPLE_SIGNING_IDENTITY
#   APPLE_ID  APPLE_PASSWORD  APPLE_TEAM_ID
#   TAURI_SIGNING_PRIVATE_KEY  TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (updater)
#   HOMEBREW_TAP_TOKEN  (optional — PAT to auto-bump the Homebrew cask)
name: release-desktop

on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:

jobs:
  # Guard against release drift: the tag, the Tauri config version, and the Cargo
  # version must all agree before we spend ~30 min building three platforms.
  verify-version:
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag == tauri.conf == Cargo
        run: |
          TAG="${GITHUB_REF_NAME#desktop-v}"
          TAURI=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO=$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$TAG  tauri.conf=$TAURI  Cargo.toml=$CARGO"
          fail=0
          [ "$TAG" = "$TAURI" ] || { echo "::error::tauri.conf.json version ($TAURI) != tag ($TAG)"; fail=1; }
          [ "$TAG" = "$CARGO" ] || { echo "::error::Cargo.toml version ($CARGO) != tag ($TAG)"; fail=1; }
          exit $fail

  release:
    needs: verify-version
    # workflow_dispatch skips verify-version (the `if` above), so don't require it there.
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # Apple Silicon; builds the universal target
            os: macos
            target: universal-apple-darwin
          - platform: windows-latest
            os: windows
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            os: linux
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # The universal-apple-darwin target is a lipo of both arch slices.
      - name: Add macOS arch targets
        if: matrix.os == 'macos'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux webview deps
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Build + (macOS) sign + notarize the .app + create/append the draft release.
      # Signing env is macOS-only and optional: empty secrets => unsigned, no failure.
      # latest.json (updater manifest) is generated on macOS only to avoid three
      # matrix jobs clobbering each other's manifest.
      - name: Build, sign, release
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('desktop-v{0}', github.run_number) }}
          releaseName: "Apioni IDE ${{ github.ref_name }}"
          releaseDraft: true
          includeUpdaterJson: ${{ matrix.os == 'macos' }}

      # macOS-only: notarize + staple the .dmg (the gap tauri-action leaves), then
      # re-upload the stapled dmg over the one the action attached.
      - name: Notarize + staple the .dmg
        if: matrix.os == 'macos'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('desktop-v{0}', github.run_number) }}
        run: |
          set -euo pipefail
          DMG=$(find src-tauri/target -path '*/release/bundle/dmg/*.dmg' | head -n1)
          if [ -z "$DMG" ]; then echo "no .dmg found"; exit 1; fi
          echo "dmg: $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          spctl -a -t open --context context:primary-signature -vv "$DMG" || true
          gh release upload "$TAG" "$DMG" --clobber

      # Publish a version-less copy of this platform's installer so the website can
      # link to a stable `releases/latest/download/<name>` URL (302s straight to the
      # file — direct download, no landing edits on a version bump). Runs on every
      # platform; picks the right bundle by matrix.os.
      - name: Publish stable-named installer for the website
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('desktop-v{0}', github.run_number) }}
          OS: ${{ matrix.os }}
        run: |
          set -euo pipefail
          case "$OS" in
            macos)
              SRC=$(find src-tauri/target -path '*/release/bundle/dmg/*.dmg' | head -n1)
              DEST="Apioni-IDE_universal.dmg" ;;
            windows)
              SRC=$(find src-tauri/target -path '*/release/bundle/nsis/*-setup.exe' | head -n1)
              DEST="Apioni-IDE_x64-setup.exe" ;;
            linux)
              SRC=$(find src-tauri/target -path '*/release/bundle/appimage/*.AppImage' | head -n1)
              DEST="Apioni-IDE_x86_64.AppImage" ;;
          esac
          if [ -z "${SRC:-}" ]; then echo "::error::no installer bundle found for $OS"; exit 1; fi
          echo "$OS: $SRC -> $DEST"
          cp "$SRC" "$DEST"
          gh release upload "$TAG" "$DEST" --clobber

      # macOS-only: bump the Homebrew cask (flowlab-works/homebrew-apioni). Needs a
      # repo secret HOMEBREW_TAP_TOKEN = a PAT with write access to the tap. Skips
      # cleanly if unset.
      - name: Bump Homebrew cask
        if: matrix.os == 'macos' && startsWith(github.ref, 'refs/tags/desktop-v')
        continue-on-error: true
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then echo "HOMEBREW_TAP_TOKEN not set — skipping cask bump"; exit 0; fi
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          DMG=$(find src-tauri/target -path '*/release/bundle/dmg/*.dmg' | head -n1)
          SHA=$(shasum -a 256 "$DMG" | cut -d' ' -f1)
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/flowlab-works/homebrew-apioni.git" /tmp/tap
          cd /tmp/tap
          sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/; s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" Casks/apioni.rb
          git config user.name "apioni-ci"; git config user.email "ci@apioni.com"
          git commit -am "apioni ${VERSION}"
          git push

      - name: Summary
        shell: bash
        run: echo "Built ${{ matrix.os }}. Un-draft the release once smoke-tested on each platform."
